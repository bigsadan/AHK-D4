[ConfigDocument]
cfgBCfgDoc_Skill=左键-突刺；右键-旋风；||1-集结；2-战吼；||3-挑战；4-先祖；||||强移键 Z||强制站立键 .
cfgBCfgDoc_OP=开启宏后，自动左键连点。通过中键来切换战斗状态。||按中键：切换到旋风状态一直转，此时点击一下左键，会切换一下普攻然后回旋风，相当于加了两层压制。点几次后叠到12层上限。后续就只要晃动鼠标一转旋风了。（要补压制就点一下左键）||要开门，开塔，互动时，再按一次中键，切换成连点模式，完成后再按一次中键切回旋风状态继续。||鼠标左键快速双击为闪避（space）||鼠标滚轮向上为放先祖（6秒增伤），伤害不够的时候可以使用，伤害够不用。||鼠标滚轮向下为喝药。
